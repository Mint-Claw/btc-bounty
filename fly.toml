# Fly.io deployment config for BTC-Bounty
# Deploy: flyctl launch --copy-config --no-deploy && flyctl deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "btc-bounty"
primary_region = "ord" # Chicago — closest to CITADEL

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  NEXT_PUBLIC_RELAYS = "wss://relay.damus.io,wss://nos.lol,wss://relay.nostr.band"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "btcbounty_data"
  destination = "/data"

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
