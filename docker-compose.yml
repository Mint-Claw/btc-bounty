services:
  btc-bounty:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - bounty-data:/app/.data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bounty-data:
