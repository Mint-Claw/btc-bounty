# BTC-Bounty — Docker Compose
# Usage: docker compose up -d
#
# Required: copy .env.example → .env and fill in values

services:
  app:
    build: .
    container_name: btc-bounty
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/btc-bounty.db
    volumes:
      - btc-bounty-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  btc-bounty-data:
    driver: local
