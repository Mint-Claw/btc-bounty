# Production Docker Compose — CITADEL deployment
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in values
#   2. Ensure BTCPay is reachable at BTCPAY_URL
#   3. Set NEXT_PUBLIC_APP_URL to your public domain

services:
  btc-bounty:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btc-bounty
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - BTCBOUNTY_DATA_DIR=/app/.data
    volumes:
      - bounty-data:/app/.data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Connect to host network for BTCPay at citadel.local
    extra_hosts:
      - "citadel.local:host-gateway"

volumes:
  bounty-data:
    driver: local
